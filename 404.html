<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon"  href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">

  <style>
    /* Page-specific overrides for the 404 layout */
    .not-found-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .not-found-inner { padding: 4rem 2rem; }
    .not-found-code {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-light);
      margin-bottom: 1.25rem;
    }
    .not-found-title {
      font-size: 1.05rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }
    .not-found-desc {
      font-size: 0.875rem;
      color: var(--color-mid);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .not-found-link {
      font-size: 0.78rem;
      color: var(--color-light);
      text-decoration: none;
      border-bottom: 1px solid var(--color-rule);
      padding-bottom: 1px;
      transition: color var(--transition), border-color var(--transition);
    }
    .not-found-link:hover {
      color: var(--color-black);
      border-color: var(--color-black);
    }
  </style>
</head>
<body>
  <div class="not-found-wrap">
    <div class="not-found-inner">
      <p class="not-found-code">404</p>
      <h1 class="not-found-title">Page not found</h1>
      <p class="not-found-desc">The page you're looking for doesn't exist or has moved.</p>
      <a class="not-found-link" href="/">← Back to portfolio</a>
    </div>
  </div>
</body>
</html>
